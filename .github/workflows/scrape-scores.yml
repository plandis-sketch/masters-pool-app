name: Scrape Scores

on:
  schedule:
    # Every hour in the days leading up to the tournament — pre-WD detection (March 28 - April 1)
    - cron: '0 12-21 28-31 3 *'
    - cron: '0 12-21 1 4 *'
    # Every 5 minutes during tournament days (April 2-5, Thu-Sun, 7am-8pm ET / 11:00-00:00 UTC)
    # UPDATE THESE DATES for each new tournament.
    - cron: '*/5 11-23 2-5 4 0,4-6'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run score scraper
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: node scripts/scrape-scores.js --once
